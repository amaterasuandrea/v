<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Cuore I Love You - Cliccami</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
            transform-origin: center;
        }

        /* Pulsante centrale */
        #audio-control {
            position: absolute;
            background: transparent;
            color: #ffcce6;
            border: 2px solid #ffcce6;
            padding: 15px 30px;
            cursor: pointer;
            border-radius: 50px;
            z-index: 1000;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(255, 204, 230, 0.4);
            transition: 0.4s;
        }

        #audio-control:hover {
            background: #ffcce6;
            color: #000;
            box-shadow: 0 0 30px #ffcce6;
        }

        /* Beat-wrapper: riceve il pulse musicale. Separato dal container delle scritte */
        #beat-wrapper {
            display: none;
            transform-origin: center;
            will-change: transform;
        }

        /* Heart-container: le scritte vivono qui */
        #heart-container {
            position: relative;
            width: 800px;
            height: 800px;
        }

        .love-text {
            position: absolute;
            color: #ffcce6;
            font-weight: 900;
            font-size: 14px;
            white-space: nowrap;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 182, 193, 0.8), 0 0 25px rgba(255, 20, 147, 0.4);
        }

        /* Le animazioni CSS vengono attivate SOLO dopo l'intro, per non creare conflitti */
        .love-text.alive {
            animation: shadow-wave 6s infinite linear, floating 2s infinite ease-in-out;
        }

        @keyframes shadow-wave {
            0%, 15%, 45%, 100% { opacity: 1; filter: blur(0px); }
            25%, 35% { opacity: 0.1; filter: blur(2px); }
        }

        @keyframes floating {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%       { transform: translate(1px, -1.5px) scale(1.02); }
            66%       { transform: translate(-1px, 1px) scale(0.98); }
        }
    </style>
</head>
<body>

<button id="audio-control">CLICKAMI</button>

<audio id="myAudio" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- beat-wrapper riceve il pulse musicale; heart-container contiene le scritte -->
<div id="beat-wrapper">
    <div id="heart-container"></div>
</div>

<script>
    const beatWrapper = document.getElementById('beat-wrapper');
    const container   = document.getElementById('heart-container');
    const audio       = document.getElementById('myAudio');
    const btn         = document.getElementById('audio-control');

    const totalWords = 80;

    // ---- CREA LE SCRITTE ----
    const wordSpans = [];
    for (let i = 0; i < totalWords; i++) {
        const span = document.createElement('span');
        span.className = 'love-text';
        span.innerText = 'I love you';

        const t = (i / totalWords) * 2 * Math.PI;
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

        const posX = 400 + x * 18;
        const posY = 350 + y * 22;

        span.dataset.finalX = posX;
        span.dataset.finalY = posY;

        // Angolo per l'ordinamento orario
        let angle = Math.atan2(posY - 350, posX - 400);
        if (angle < -Math.PI / 2) angle += 2 * Math.PI;
        span.dataset.angle = angle;

        span.style.left    = posX + 'px';
        span.style.top     = posY + 'px';
        span.style.opacity = '0';

        container.appendChild(span);
        wordSpans.push(span);
    }

    // Ordina in senso orario per la formazione del cuore
    wordSpans.sort((a, b) => parseFloat(a.dataset.angle) - parseFloat(b.dataset.angle));

    // ---- AUDIO BEAT VISUALIZER ----
    // Attivato solo dopo l'intro per non interferire con i transform dell'animazione
    let audioCtx  = null;
    let beatActive = false;

    function setupBeat() {
        if (audioCtx) return;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();

        const analyser    = audioCtx.createAnalyser();
        analyser.fftSize  = 256;
        const dataArray   = new Uint8Array(analyser.frequencyBinCount);

        const source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);

        (function tick() {
            requestAnimationFrame(tick);
            if (!beatActive) return;

            analyser.getByteFrequencyData(dataArray);

            // Calcola la potenza dei bassi (bin 0-7 = sub-bass/kick drum)
            let bassSum = 0;
            for (let i = 0; i < 8; i++) bassSum += dataArray[i];
            const bassAvg = bassSum / 8;

            // Curva esponenziale: risponde forte solo ai colpi di cassa
            const punch = Math.pow(bassAvg / 255, 2.5);
            const scale = 1 + punch * 0.22; // Max +22% di scala

            // Il pulse viene applicato SOLO su beat-wrapper, non tocca le trasformazioni delle singole scritte
            beatWrapper.style.transform = `scale(${scale})`;
        })();
    }

    // ---- CLICK ----
    btn.addEventListener('click', async () => {
        setupBeat();
        audio.play();
        btn.style.display         = 'none';
        beatWrapper.style.display = 'block';

        await fastIntroAnimation();

        // Intro finita: attiva il beat e le animazioni CSS delle scritte
        beatActive = true;
        wordSpans.forEach(w => w.classList.add('alive'));
    });

    // ---- ANIMAZIONE: TRENO → CUORE ORARIO ----
    function fastIntroAnimation() {
        return new Promise(resolve => {

            // FASE 1: Zoom in aggressivo sulla camera (body)
            document.body.style.transition = 'transform 0.5s cubic-bezier(0.1, 0.9, 0.2, 1)';
            document.body.style.transform  = 'scale(3) translateX(0px)';

            // Piazza tutte le parole al centro (dietro il pulsante), invisibili
            wordSpans.forEach(word => {
                word.style.transition = 'none';
                word.style.left       = '400px';
                word.style.top        = '400px';
                word.style.transform  = 'scale(0.4)';
                word.style.opacity    = '0';
            });

            container.offsetHeight; // reflow

            // FASE 2: Il treno sfreccia a destra in fila indiana
            setTimeout(() => {
                wordSpans.forEach((word, i) => {
                    setTimeout(() => {
                        word.style.transition = 'left 0.9s linear, opacity 0.1s, transform 0.9s linear';
                        word.style.opacity    = '1';
                        word.style.left       = '2200px';
                        word.style.transform  = 'scale(1.8)';
                    }, i * 32); // 80 * 32ms = ~2.5s di treno
                });
            }, 50);

            // FASE 2.5: Camera tracking — la camera segue il treno verso destra
            setTimeout(() => {
                document.body.style.transition = 'transform 2.4s cubic-bezier(0.25, 1, 0.5, 1)';
                document.body.style.transform  = 'scale(3) translateX(-380px)';
            }, 550);

            // FASE 3: a 3s — congela il treno, zoom-out, forma il cuore
            setTimeout(() => {
                // Zoom-out della camera che torna alla posizione originale
                document.body.style.transition = 'transform 2.5s cubic-bezier(0.34, 1.2, 0.64, 1)';
                document.body.style.transform  = 'scale(1) translateX(0px)';

                // Congela ogni parola esattamente dove si trova in questo istante
                wordSpans.forEach(word => {
                    const cl = parseFloat(window.getComputedStyle(word).left) || 400;
                    const ct = parseFloat(window.getComputedStyle(word).top)  || 400;
                    word.style.transition = 'none';
                    word.style.left       = cl + 'px';
                    word.style.top        = ct + 'px';
                });

                container.offsetHeight; // reflow

                // Formazione del cuore in senso orario (le parole sono già ordinate per angolo)
                wordSpans.forEach((word, i) => {
                    setTimeout(() => {
                        word.style.transition = 'all 1.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                        word.style.left       = word.dataset.finalX + 'px';
                        word.style.top        = word.dataset.finalY + 'px';
                        word.style.transform  = 'scale(1)';
                    }, i * 18);
                });

                // Risolve la promise quando tutte le parole sono arrivate
                setTimeout(() => resolve(), (wordSpans.length * 18) + 1600);

            }, 3000);
        });
    }
</script>

</body>
</html>
